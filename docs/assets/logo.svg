<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 170" width="520" height="170" role="img" aria-labelledby="t d">
  <title id="t">patchworks</title>
  <desc id="d">A patchwork of image tiles with cells crossing the seams as single unified labels.</desc>

  <!-- icon: 3x3 quilt of tiles -->
  <g stroke="#dce3ee" stroke-width="1">
    <rect x="16"  y="16"  width="38" height="38" rx="7" fill="#fdeef0"/>
    <rect x="61"  y="16"  width="38" height="38" rx="7" fill="#eef6f4"/>
    <rect x="106" y="16"  width="38" height="38" rx="7" fill="#eef1fb"/>
    <rect x="16"  y="61"  width="38" height="38" rx="7" fill="#f6f1ea"/>
    <rect x="61"  y="61"  width="38" height="38" rx="7" fill="#eef4fb"/>
    <rect x="106" y="61"  width="38" height="38" rx="7" fill="#f3eef9"/>
    <rect x="16"  y="106" width="38" height="38" rx="7" fill="#eaf6f1"/>
    <rect x="61"  y="106" width="38" height="38" rx="7" fill="#fbf0ea"/>
    <rect x="106" y="106" width="38" height="38" rx="7" fill="#eef2f9"/>
  </g>

  <!-- stitched seams -->
  <g stroke="#c2ccdb" stroke-width="1.4" stroke-dasharray="2 4" stroke-linecap="round">
    <line x1="57.5" y1="20" x2="57.5" y2="140"/>
    <line x1="102.5" y1="20" x2="102.5" y2="140"/>
    <line x1="20" y1="57.5" x2="140" y2="57.5"/>
    <line x1="20" y1="102.5" x2="140" y2="102.5"/>
  </g>

  <!-- cells: each a single shape spanning seams = one global label -->
  <g stroke-linejoin="round" fill-opacity="0.92">
    <path d="M75 38 C95 38 110 52 108 72 C107 92 92 106 72 105 C52 104 40 90 42 70 C44 52 56 38 75 38 Z"
          fill="#ff6b6b" stroke="#e84a5f" stroke-width="2.5"/>
    <path d="M112 92 C126 92 134 102 132 116 C130 130 120 136 108 134 C96 132 90 122 93 110 C96 100 102 92 112 92 Z"
          fill="#2ec4b6" stroke="#159a8d" stroke-width="2.5"/>
    <path d="M50 104 C61 104 67 112 64 123 C61 133 51 135 43 130 C36 126 34 115 40 109 C43 106 46 104 50 104 Z"
          fill="#5a7bef" stroke="#3f5bc6" stroke-width="2.5"/>
  </g>

  <!-- wordmark -->
  <text x="172" y="95" font-family="'Poppins','Segoe UI',system-ui,sans-serif" font-size="58" font-weight="600" fill="#2b3a55">patchworks</text>
  <text x="174" y="123" font-family="'Poppins','Segoe UI',system-ui,sans-serif" font-size="17" font-weight="500" fill="#6b7a93" letter-spacing="0.5">tiled segmentation, stitched whole</text>
</svg>
