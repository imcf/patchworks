name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ruff check
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.18"
          args: "check"

      - name: ruff format --check
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.18"
          args: "format --check"

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: "**/*.md"
