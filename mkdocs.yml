site_name: patchworks
repo_name: imcf/patchworks
repo_url: https://github.com/imcf/patchworks
copyright: Copyright &copy; 2025 IMCF Basel

theme:
  name: material
  palette:
  - scheme: default
    primary: deep orange
    accent: orange
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - scheme: slate
    primary: deep orange
    accent: orange
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  features:
  - content.code.annotate
  - content.code.copy
  - content.tabs.link
  - navigation.expand
  - navigation.sections
  - navigation.top
  - navigation.footer
  - toc.integrate
  - search.highlight
  - search.share

nav:
- Home: index.md
- Getting Started: getting_started.md
- User Guide:
  - Tiling strategy: guide/tiling.md
  - Merging labels: guide/merging.md
  - Empty tile skipping: guide/skip_empty.md
  - GPU & distributed: guide/gpu_distributed.md
  - OME-ZARR & napari: guide/ome_zarr_napari.md
  - Pitfalls: guide/pitfalls.md
- Examples:
  - Cellpose 2-D: examples/cellpose_2d.md
  - Cellpose 3-D: examples/cellpose_3d.md
  - StarDist: examples/stardist.md
  - Custom function: examples/custom.md
  - Standalone merge: examples/standalone_merge.md
- API Reference:
  - tile_process: api/tile_process.md
  - merge_tile_labels: api/merge_tile_labels.md
  - Tile sizing: api/chunks.md
  - I/O helpers: api/io.md
  - Relabelling: api/relabel.md
  - Cluster helpers: api/cluster.md
  - Plugins:
    - Cellpose: api/plugins/cellpose.md
    - OME-ZARR conversion: api/plugins/ome_zarr.md
    - napari viewer: api/plugins/napari.md

plugins:
- search
- mkdocstrings:
    handlers:
      python:
        paths: [ src ]
        options:
          show_root_heading: true
          show_source: true
          show_signature_annotations: true
          heading_level: 2
          members_order: source
          docstring_style: numpy

markdown_extensions:
- admonition
- attr_list
- md_in_html
- pymdownx.details
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.superfences
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji ""
    emoji_generator: !!python/name:material.extensions.emoji.to_svg ""
