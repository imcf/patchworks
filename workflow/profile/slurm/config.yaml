# Snakemake 8+ SLURM profile for the patchworks workflow.
# Needs: pip install "patchworks[workflow]"  (snakemake + slurm executor plugin)
# Run:   snakemake --workflow-profile profile/slurm --configfile config/config.yaml
#
# Edit the partitions / account / GPU request for your cluster.

executor: slurm
# Max concurrent SLURM jobs Snakemake will have in flight at once. This is a
# submission-side cap, not a cluster limit — raising it just lets more
# "segment" tiles queue/run together; scicore's scheduler still enforces your
# real GPU quota (MaxTRESPU) and backfills the rest, so it's safe to raise.
# Check your actual per-user GPU cap with:
#   sacctmgr show assoc user=$USER format=account,partition,maxjobs,GrpTRES
jobs: 128
latency-wait: 60
rerun-incomplete: true
# Only re-run when an output is missing/stale — NOT when the patchworks code,
# params or software env change. Stops an upgrade from re-doing the expensive
# conversion / re-segmenting an existing image.zarr.
rerun-triggers: mtime
printshellcmds: true
keep-going: true

# Defaults for every rule (CPU jobs).
default-resources:
  slurm_partition: "scicore"
  # slurm_account: "my_account"
  mem_mb: 16000
  cpus_per_task: 4
  runtime: 60 # minutes

# Per-rule overrides.
set-resources:
  convert:
    # bioio/dask's default threaded scheduler uses every visible core, so
    # this scales conversion for free. Verify actual scaling with `seff
    # <jobid>` after a run and dial back if efficiency is low (scicore
    # fair-share asks you not to sit on idle cores).
    mem_mb: 64000
    cpus_per_task: 32
    runtime: 360
  prepare:
    mem_mb: 32000
    runtime: 120
  segment:
    # one GPU per tile — this is what spreads Cellpose across GPUs.
    # Use the plugin's native `gres` resource → emits --gres=gpu:1, which is
    # how scicore binds a CUDA device. (The `gpu:` resource emits --gpus and
    # leaves the job without a device.)
    slurm_partition: "rtx4090"
    gres: "gpu:1"
    qos: "rtx4090-6hours" # scicore: <partition>-<duration> QOS
    mem_mb: 32000 # plenty — a tile used ~1G
    cpus_per_task: 4
    runtime: 360 # 6 hours — must match the QOS, NOT 120 (=2h → killed early)
  merge:
    # merge_tile_labels now uses n_workers = this allocation (see merge.py /
    # config.yaml's merge_workers) instead of silently capping at 4 threads.
    mem_mb: 128000
    cpus_per_task: 32
    runtime: 240
