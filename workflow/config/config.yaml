# patchworks Snakemake workflow — configuration.
# Copy and edit, then run:  snakemake --workflow-profile profile/slurm
#
# The expensive Cellpose step is split into one SLURM job per tile, so many
# GPUs run in parallel; the merge is a single CPU job.

# ---- input / output ---------------------------------------------------------
input: "/path/to/scan.ims" # .ims, .czi, .lif, .nd2, ome-tiff, .zarr, or a
#                             glob (e.g. "/path/*.tif") when sequence_pattern
#                             is set below
work_dir: "/path/to/results" # everything is written under here
# Final outputs (under work_dir):
#   image.zarr            — converted, pyramidal OME-ZARR
#   image.zarr/labels/<name>/  — the segmentation (multi-scale), in the image

# ---- conversion -------------------------------------------------------------
reuse_pyramid: false # for .ims: copy its own pyramid (fast); else rebuild
convert_chunks: null # null → patchworks' bounded auto chunks; or [c,z,y,x]
shard: false # true → pack chunks into shards (zarr v3; fewer files)
# For a folder of single-plane TIFFs (input: a glob), set the filename regex
# below; named groups become axes, e.g. one file per Z/C plane:
# sequence_pattern: '_T(?P<T>\d+)_Z(?P<Z>\d+)_C(?P<C>\d+)_V\d+'
sequence_pattern: null
# Re-running reuses an existing image.zarr automatically (skips conversion).
# To force a rebuild: delete image.zarr, or `snakemake --forcerun convert`.

# ---- tiling -----------------------------------------------------------------
channel: 0 # channel to segment
level: 0 # pyramid level to segment (0 = full res)
tile_shape: "auto" # "auto", or e.g. [16, 1024, 1024] (zyx)
gpu_memory_gb: null # for "auto" on a CPU prepare node: your segment GPU's VRAM
#                     (e.g. 24, 40, 80). null → 8 GiB guess + a harmless warning
overlap: 30 # halo (≈ one object diameter)
skip_empty: true # skip background tiles
empty_threshold: null # null → Otsu; or a number

# ---- segmentation -----------------------------------------------------------
method: "cellpose" # "cellpose" (GPU), "threshold" (no GPU; testing), "custom"
# dilate: 2       # optional: pixels to grow labels by after segmentation, any method
# dilate_gpu: true # optional: dilate via cupy instead of scipy, needs a GPU
# Also namespaces this run's intermediate files under work_dir/<label_name>/,
# so a second segmentation (different label_name, e.g. nuclei vs cytoplasm)
# can safely target the same work_dir — see docs/guide/snakemake.md
# "Running two segmentations".
label_name: "cellpose_labels"
cellpose:
  model: "nuclei"
  diameter: 30
  do_3D: true
  gpu: true
  # extra kwargs forwarded to model.eval(), e.g.:
  # flow_threshold: 0.4
  # cellprob_threshold: 0.0

# Your own per-tile function (method: "custom"). See the "custom function"
# section of docs/guide/snakemake.md.
# custom:
#   module: "my_seg"     # importable on the cluster (workflow/scripts/, PYTHONPATH, or pip-installed)
#   function: "segment"  # def segment(tile: np.ndarray) -> np.ndarray (int32 labels)
#   kwargs: {}           # optional extra keyword args

# ---- pyramid for the labels -------------------------------------------------
pyramid_levels: 5
pyramid_downscale: 2
sequential_labels: true # renumber merged labels to a contiguous 1..N range

# ---- merge performance --------------------------------------------------
# null -> use the "merge" rule's actual cpus_per_task (profile/slurm/config.yaml).
merge_workers: null
